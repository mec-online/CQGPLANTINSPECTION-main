    <path d="M36 42 L40 46 M36 42 L38 47 M36 42 L34 47" stroke="#dc2d2f" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- CQG wordmark -->
  <text x="66" y="40" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#dc2d2f" letter-spacing="-0.5">CQG</text>
  <!-- Tagline -->
  <text x="67" y="53" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="8.5" font-weight="500" fill="#666666" letter-spacing="1.5">CYMRU QUARRY GROUP</text>
</svg>
