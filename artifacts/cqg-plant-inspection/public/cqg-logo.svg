    <path d="M16 28 C10 22 8 14 14 10 C18 7 24 9 26 14 C28 10 34 8 38 12 C44 18 40 28 34 30 L36 40 C36 44 32 48 28 48 C24 48 20 44 20 40 Z" fill="#dc2d2f"/>
    <!-- Wing left -->
