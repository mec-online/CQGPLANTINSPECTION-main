    <!-- Wing right -->
    <path d="M38 16 C44 12 50 16 48 24 C46 28 40 28 36 24 Z" fill="#dc2d2f" opacity="0.85"/>
    <!-- Head -->
    <circle cx="28" cy="9" r="6" fill="#dc2d2f"/>
