            format: uuid
        - name: assetId
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated list
          content:
            application/json:
              schema:
                type: object
                properties:
                  breakdowns:
                    type: array
                    items:
                      $ref: "#/components/schemas/Breakdown"
                  total:
                    type: integer
    post:
      operationId: createBreakdown
      tags: [breakdowns]
      summary: Report a breakdown
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assetId, siteId, description]
              properties:
                assetId:
                  type: string
                  format: uuid
                siteId:
                  type: string
                  format: uuid
                description:
                  type: string
                cause:
                  type: string
                area:
                  type: string
                startedAt:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Created breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Breakdown"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

