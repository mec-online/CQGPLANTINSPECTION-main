name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - main          # ← change if your default branch is different
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  PNPM_VERSION: '10'   # ← match your lockfile version (check pnpm-lock.yaml header)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup pnpm (must come before Node setup for caching to work) ───
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      # ── 3. Setup Node ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # ── 4. Install all workspace dependencies ─────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Build frontend ──────────────────────────────────────────────────
      # Output lands in: artifacts/cqg-plant-inspection/dist
      - name: Build frontend
        run: pnpm --filter @workspace/cqg-plant-inspection run build
        # ↑ Replace @workspace/cqg-plant-inspection with the actual "name"
        #   from artifacts/cqg-plant-inspection/package.json

      # ── 6. Build API server ────────────────────────────────────────────────
      # Output lands in: artifacts/api-server/dist  (adjust if different)
      - name: Build API server
        run: pnpm --filter @workspace/api-server run build
        # ↑ Replace @workspace/api-server with the actual "name"
        #   from artifacts/api-server/package.json

      # ── 7. Assemble deploy package ─────────────────────────────────────────
      # We copy only what's needed to run in production.
      # The frontend dist is placed where Express will serve it from.
      - name: Assemble deploy package
        run: |
          mkdir -p deploy

          # Copy built API server
          cp -r artifacts/api-server/dist deploy/
          cp artifacts/api-server/package.json deploy/

          # Copy frontend build into the path Express expects
          # ⚠️  Adjust 'public' below to match STATIC_DIR in your Express server
          mkdir -p deploy/public
          cp -r artifacts/cqg-plant-inspection/dist/. deploy/public/

          # Copy root package.json so Azure knows it's Node
          cp package.json deploy/package.json.workspace

          # Production deps only
          cd deploy
          npm init -y  # temp manifest so `npm install` works here
          # ↑ Better: copy a minimal package.json with just prod dependencies

      # ── 8. Create startup file ─────────────────────────────────────────────
      - name: Create Azure startup script
        run: |
          cat > deploy/startup.sh << 'EOF'
          #!/bin/bash
          # Run DB migrations then start server
          # Uncomment the migration line once you're confident it's safe:
          # node dist/migrate.js
          node dist/index.js
          EOF
          chmod +x deploy/startup.sh

      # ── 9. Deploy to Azure App Service ────────────────────────────────────
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}   # ← set in repo secrets
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}  # ← set in repo secrets
          package: ./deploy
